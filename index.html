<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync-Presenter Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #0b0b0b; --text-color: #ffffff; --accent: #007aff; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: var(--bg-color); color: var(--text-color); font-family: -apple-system, system-ui, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 30px; }
        .auth-view { width: 350px; display: none; flex-direction: column; gap: 10px; }
        .active { display: flex; }
        input { padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid var(--border); border-radius: 12px; color: white; }
        button { background: white; color: black; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #app-view { display: none; width: 100%; height: 100%; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .workspace { display: flex; gap: 20px; flex: 1; margin-top: 20px; min-height: 0; }
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .main-stage { flex: 1; position: relative; background: #000; border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
        video { max-width: 100%; max-height: 100%; }
        .timeline { position: absolute; bottom: 20px; left: 20px; right: 20px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 3px; }
        .marker { position: absolute; top: 0; width: 3px; height: 100%; background: white; box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <script>
        const SB_URL = 'https://pcuovwubibafsvtmgjhe.supabase.co'; 
        const SB_KEY = 'sb_publishable_QX082-88Cx0-4Ipg5gXp3g__NUz2bWm';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    </script>

    <div id="view-auth" class="glass-panel auth-view active">
        <h2 style="margin:0">Sync-Presenter</h2>
        <input type="email" id="email-field" placeholder="Email">
        <input type="password" id="pass-field" placeholder="Mot de passe">
        <button onclick="handleLogin()">Connexion</button>
        <button style="background:transparent; color:white; border:1px solid var(--border)" onclick="handleSignUp()">Créer un compte</button>
    </div>

    <div id="app-view">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h3>Espace Cloud</h3>
            <button onclick="logout()">Déconnexion</button>
        </div>
        <div class="workspace">
            <div class="sidebar glass-panel">
                <label style="font-size:12px; color:#888">Paliers (ex: 5, 12, 40)</label>
                <input type="text" id="input-timings" placeholder="Paliers" oninput="handleTimingsChange()">
                
                <div style="background:var(--accent); padding:15px; border-radius:15px; cursor:pointer; text-align:center" onclick="loadVideoFromUrl()">
                    <span style="font-weight:bold">🔗 Lier une vidéo Dropbox</span>
                </div>

                <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:15px; cursor:pointer; text-align:center" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" style="display:none" onchange="handleFile(this)">
                    <span>📁 Fichier Local (PC)</span>
                </div>
            </div>
            <div class="main-stage">
                <video id="main-video" crossorigin="anonymous" playsinline></video>
                <div class="timeline"><div class="progress-fill" id="fill"></div></div>
            </div>
        </div>
    </div>

    <script>
        let userEmail = null, marks = [], stopPoint = null, currentUrl = null;
        const video = document.getElementById('main-video');

        async function handleLogin() {
            const email = document.getElementById('email-field').value;
            const password = document.getElementById('pass-field').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else { userEmail = data.user.email; await loadCloudData(); showApp(); }
        }

        async function handleSignUp() {
            const email = document.getElementById('email-field').value;
            const password = document.getElementById('pass-field').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert(error.message); else alert("Vérifiez vos emails !");
        }

        function loadVideoFromUrl(urlFromCloud = null) {
            let url = urlFromCloud || prompt("Collez le lien Dropbox (finissant par ?dl=0) :");
            if (url) {
                // Conversion automatique Dropbox pour le streaming direct
                currentUrl = url.replace('?dl=0', '?raw=1').replace('?dl=1', '?raw=1');
                video.src = currentUrl;
                video.load();
                if (!urlFromCloud) saveToCloud();
            }
        }

        function handleFile(input) {
            const file = input.files[0];
            if(file) { video.src = URL.createObjectURL(file); currentUrl = null; saveToCloud(); }
        }

        async function saveToCloud() {
            if (!userEmail) return;
            await supabaseClient.from('settings').upsert({ 
                email: userEmail, 
                timings_data: document.getElementById('input-timings').value,
                video_url: currentUrl 
            }, { onConflict: 'email' });
        }

        async function loadCloudData() {
            const { data } = await supabaseClient.from('settings').select('*').eq('email', userEmail).single();
            if(data) {
                document.getElementById('input-timings').value = data.timings_data || "";
                marks = data.timings_data.split(',').map(t => parseFloat(t.trim())).filter(t => !isNaN(t));
                if (data.video_url) loadVideoFromUrl(data.video_url);
                refreshMarkers();
            }
        }

        function handleTimingsChange() {
            marks = document.getElementById('input-timings').value.split(',').map(t => parseFloat(t.trim())).filter(t => !isNaN(t)).sort((a,b)=>a-b);
            refreshMarkers();
            saveToCloud();
        }

        function refreshMarkers() {
            document.querySelectorAll('.marker').forEach(m => m.remove());
            marks.forEach(t => {
                const m = document.createElement('div'); m.className = 'marker';
                m.style.left = (t / video.duration * 100) + '%';
                document.querySelector('.timeline').appendChild(m);
            });
        }

        function watch() {
            if(stopPoint !== null && video.currentTime >= stopPoint) {
                video.pause(); video.currentTime = stopPoint; stopPoint = null;
            } else { requestAnimationFrame(watch); }
        }

        window.onkeydown = (e) => {
            if(e.target.tagName === 'INPUT') return;
            if(e.code === 'Space' || e.code === 'ArrowRight') {
                e.preventDefault();
                const next = marks.find(t => t > video.currentTime + 0.1);
                stopPoint = (next !== undefined) ? next : video.duration;
                video.play(); watch();
            }
        };

        video.ontimeupdate = () => { document.getElementById('fill').style.width = (video.currentTime / video.duration * 100) + '%'; };
        function showApp() { document.getElementById('view-auth').classList.remove('active'); document.getElementById('app-view').style.display = 'flex'; }
        function logout() { supabaseClient.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
