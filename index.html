<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync-Presenter Pro Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #000000; --text-color: #ffffff; --accent: #007aff; --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        body { margin: 0; background: var(--bg-color); color: var(--text-color); font-family: var(--font-family); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        .auth-view { width: 380px; display: none; flex-direction: column; }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 14px; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #fff; color: #000; border: none; padding: 14px; border-radius: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        button.secondary { background: transparent; color: white; border: 1px solid var(--glass-border); }
        #app-view { display: none; width: 100%; height: 100%; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .workspace { display: flex; gap: 20px; flex: 1; min-height: 0; margin-top: 20px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .main-stage { flex: 1; position: relative; background: #080808; border-radius: 24px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { max-width: 100%; max-height: 100%; outline: none; }
        .timeline { position: absolute; bottom: 30px; left: 30px; right: 30px; height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; }
        .progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 4px; }
        .marker { position: absolute; top: 0; width: 2px; height: 100%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .status-dot { width: 10px; height: 10px; background: #34c759; border-radius: 50%; display: inline-block; margin-right: 8px; opacity: 0; transition: opacity 0.3s; }
        .import-box { border: 1px solid var(--glass-border); padding: 15px; border-radius: 18px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.03); }
        .import-box:hover { background: rgba(255,255,255,0.08); }
    </style>
</head>
<body>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = 'https://pcuovwubibafsvtmgjhe.supabase.co'; 
        const SB_KEY = 'sb_publishable_QX082-88Cx0-4Ipg5gXp3g__NUz2bWm'; // Utilisez la clé anon/publishable [cite: 2026-02-06]
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    </script>

    <div id="view-auth" class="glass-panel auth-view active">
        <h2>Sync-Presenter</h2>
        <input type="email" id="email-field" placeholder="Email">
        <input type="password" id="pass-field" placeholder="Mot de passe">
        <button onclick="handleLogin()">Se connecter</button>
        <button class="secondary" onclick="handleSignUp()">Créer un compte</button>
    </div>

    <div id="app-view">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <div>
                <span id="save-indicator" class="status-dot"></span>
                <h2 style="margin:0; display: inline-block;">Espace de Travail</h2>
            </div>
            <button onclick="logout()" class="secondary" style="width:auto; margin:0; padding:10px 20px">Déconnexion</button>
        </div>
        
        <div class="workspace">
            <div class="sidebar glass-panel">
                <p style="margin:0; font-size: 14px; color: #888;">Paliers (ex: 12, 35, 60)</p>
                <input type="text" id="input-timings" placeholder="0, 15, 30" oninput="handleTimingsChange()">
                
                <hr style="width:100%; border:0; border-top:1px solid #222; margin:10px 0;">

                <div class="import-box" style="border-color: var(--accent);" onclick="loadVideoFromUrl()">
                    <p style="margin: 0; font-weight: 600; color: var(--accent);">🔗 Vidéo Google Drive</p>
                    <p style="margin: 5px 0 0 0; font-size: 11px; color: #666;">Synchronisé sur votre compte</p>
                </div>

                <div class="import-box" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" accept="video/mp4" style="display:none" onchange="handleFile(this)">
                    <p style="margin: 0; font-weight: 600;">📁 Fichier Local (PC)</p>
                    <p style="margin: 5px 0 0 0; font-size: 11px; color: #666;">Uniquement sur cet ordinateur</p>
                </div>
            </div>

            <div class="main-stage">
                <video id="main-video" crossorigin="anonymous" playsinline></video>
                <div class="timeline"><div class="progress-fill" id="fill"></div></div>
            </div>
        </div>
    </div>

    <script>
        let userEmail = null;
        let marks = [];
        let stopPoint = null;
        let currentDriveUrl = null;
        const video = document.getElementById('main-video');

        // --- AUTH ---
        async function handleSignUp() {
            const email = document.getElementById('email-field').value;
            const password = document.getElementById('pass-field').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("Vérifiez vos emails !");
        }

        async function handleLogin() {
            const email = document.getElementById('email-field').value;
            const password = document.getElementById('pass-field').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else { userEmail = data.user.email; await loadCloudData(); showApp(); }
        }

        // --- VIDÉO ---
        function getDirectDriveUrl(shareUrl) {
            const match = shareUrl.match(/\/d\/([\w-]+)/) || shareUrl.match(/id=([\w-]+)/);
            return match ? `https://drive.google.com/uc?export=download&id=${match[1]}` : shareUrl;
        }

        function handleFile(input) {
            const file = input.files[0];
            if(file) {
                currentDriveUrl = null; // On annule le lien Drive si on charge en local
                video.src = URL.createObjectURL(file);
                video.onloadedmetadata = refreshMarkers;
                saveToCloud();
            }
        }

        async function loadVideoFromUrl(urlFromCloud = null) {
            let url = urlFromCloud || prompt("Collez le lien de partage Google Drive :");
            if (url) {
                currentDriveUrl = url;
                video.src = getDirectDriveUrl(url);
                video.load();
                if (!urlFromCloud) saveToCloud();
            }
        }

        // --- SYNC ---
        async function saveToCloud() {
            if (!userEmail) return;
            const timings = document.getElementById('input-timings').value;
            const { error } = await supabaseClient.from('settings').upsert({ 
                email: userEmail, 
                timings_data: timings,
                video_url: currentDriveUrl || "" 
            }, { onConflict: 'email' });

            if(!error) {
                const dot = document.getElementById('save-indicator');
                dot.style.opacity = "1";
                setTimeout(() => dot.style.opacity = "0", 1000);
            }
        }

        function handleTimingsChange() {
            const val = document.getElementById('input-timings').value;
            marks = val.split(',').map(t => parseFloat(t.trim())).filter(t => !isNaN(t)).sort((a,b) => a-b);
            refreshMarkers();
            saveToCloud();
        }

        async function loadCloudData() {
            const { data } = await supabaseClient.from('settings').select('*').eq('email', userEmail).single();
            if(data) {
                document.getElementById('input-timings').value = data.timings_data || "";
                marks = (data.timings_data || "").split(',').map(t => parseFloat(t.trim())).filter(t => !isNaN(t));
                if (data.video_url) loadVideoFromUrl(data.video_url);
                refreshMarkers();
            }
        }

        // --- LOGIQUE ---
        function showApp() { document.getElementById('view-auth').classList.remove('active'); document.getElementById('app-view').style.display = 'flex'; }
        
        function refreshMarkers() {
            document.querySelectorAll('.marker').forEach(m => m.remove());
            marks.forEach(t => {
                if(video.duration) {
                    const m = document.createElement('div'); m.className = 'marker';
                    m.style.left = (t / video.duration * 100) + '%';
                    document.querySelector('.timeline').appendChild(m);
                }
            });
        }

        function watch() {
            if(stopPoint !== null && video.currentTime >= stopPoint) {
                video.pause(); video.currentTime = stopPoint; stopPoint = null;
            } else { requestAnimationFrame(watch); }
        }

        window.onkeydown = (e) => {
            if(e.target.tagName === 'INPUT') return;
            if(e.code === 'Space' || e.code === 'ArrowRight') {
                e.preventDefault();
                const next = marks.find(t => t > video.currentTime + 0.1);
                stopPoint = (next !== undefined) ? next : video.duration;
                video.play(); watch();
            }
            if(e.code === 'ArrowLeft') {
                e.preventDefault();
                const prev = [...marks].reverse().find(t => t < video.currentTime - 0.2);
                video.currentTime = prev || 0; video.pause(); stopPoint = null;
            }
        };

        video.ontimeupdate = () => { document.getElementById('fill').style.width = (video.currentTime / video.duration * 100) + '%'; };
        function logout() { supabaseClient.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
